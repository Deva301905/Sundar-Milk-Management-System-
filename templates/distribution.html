<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/logo.png">
    <title>Dynamic Distribution & Khata - Sundar Milk Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-gray-800 h-screen flex flex-col overflow-hidden">

    <header class="bg-white shadow-sm px-4 lg:px-8 py-4 flex justify-between items-center z-20 border-b border-gray-200">
        <div class="flex items-center gap-4">
            <img src="/static/logo1.png" alt="Sundar Milk Logo" class="h-10 w-10 object-contain rounded" onerror="this.outerHTML='<div class=\'h-10 w-10 bg-indigo-600 rounded-xl flex items-center justify-center\'><svg class=\'h-6 w-6 text-white\' fill=\'none\' stroke=\'currentColor\' viewBox=\'0 0 24 24\'><path stroke-linecap=\'round\' stroke-linejoin=\'round\' stroke-width=\'2\' d=\'M13 10V3L4 14h7v7l9-11h-7z\'></path></svg></div>'">
            <div>
                <h1 class="text-xl lg:text-2xl font-black text-gray-900 leading-tight">Wholesale & Route Ledger</h1>
                <p class="text-xs lg:text-sm text-gray-500 font-medium">Manage drop carts and shop balances (Khata)</p>
            </div>
        </div>
        <button onclick="window.location.href='/'" class="px-4 py-2 bg-gray-100 text-gray-600 rounded-lg font-bold hover:bg-gray-200 transition shadow-sm whitespace-nowrap">Dashboard</button>
    </header>

    <main class="flex-1 overflow-hidden p-4 lg:p-6 flex flex-col lg:flex-row gap-6">
        
        <section class="lg:w-1/3 flex flex-col bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden z-10 flex-shrink-0 max-h-full">
            
            <div class="flex border-b border-gray-200 bg-gray-50">
                <button id="tabDrop" class="flex-1 py-4 text-sm font-black text-indigo-700 border-b-2 border-indigo-600 bg-white transition-all">📝 DAILY DROP CART</button>
                <button id="tabRegister" class="flex-1 py-4 text-sm font-bold text-gray-500 hover:text-gray-700 transition-all">➕ NEW CUSTOMER</button>
            </div>

            <div class="flex-1 overflow-y-auto relative">
                
                <div id="viewDrop" class="p-6">
                    <div class="mb-5">
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Select Shop / Home</label>
                        <select id="drop_customer" class="w-full px-4 py-3 border-2 border-indigo-100 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none font-bold text-gray-800 bg-indigo-50/50">
                            <option value="" disabled selected>Loading registered customers...</option>
                        </select>
                    </div>

                    <div class="border-t border-gray-100 pt-5 mb-5">
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Add Items to Drop</label>
                        <div class="flex flex-col gap-3">
                            <select id="drop_product" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 font-medium">
                                <option value="" disabled selected>Loading inventory...</option>
                            </select>
                            <div class="flex gap-3">
                                <input type="number" id="drop_qty" min="1" placeholder="Qty" class="w-1/3 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 font-bold">
                                <button id="addItemBtn" class="flex-1 bg-slate-800 text-white font-bold rounded-lg hover:bg-slate-700 transition">Add to List</button>
                            </div>
                        </div>
                    </div>

                    <div class="bg-gray-50 rounded-xl p-3 border border-gray-200 mb-5 min-h-[100px]">
                        <ul id="dropCartList" class="space-y-2 text-sm">
                            <li class="text-gray-400 text-center font-medium italic py-2">Cart is empty</li>
                        </ul>
                    </div>

                    <div class="border-t border-gray-200 pt-4 space-y-3 bg-white sticky bottom-0">
                        <div class="flex justify-between items-center text-gray-600 font-bold">
                            <span>Total Bill:</span>
                            <span id="drop_total_bill" class="text-xl text-gray-900">₹0.00</span>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Cash Received Now</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500 font-bold">₹</span>
                                <input type="number" id="drop_cash" placeholder="0.00" class="w-full pl-8 pr-4 py-3 border-2 border-green-200 rounded-xl focus:ring-2 focus:ring-green-500 font-black text-green-700 bg-green-50 text-lg">
                            </div>
                        </div>
                        <button id="dispatchBtn" class="w-full bg-indigo-600 text-white font-black text-lg py-4 rounded-xl hover:bg-indigo-700 shadow-lg shadow-indigo-500/30 transition-transform transform active:scale-95 disabled:opacity-50" disabled>
                            MARK DELIVERED
                        </button>
                    </div>
                </div>

                <div id="viewRegister" class="hidden p-6">
                    <form id="addCustomerForm" class="space-y-5">
                        <div id="formStatus" class="hidden p-3 rounded-lg text-sm font-bold text-center"></div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Customer / Store Name</label>
                            <input type="text" id="customer_name" required placeholder="e.g. Kannan Supermarket" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-gray-50">
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Customer Type</label>
                            <select id="customer_type" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-gray-50">
                                <option value="Store">🏪 Wholesale Store</option>
                                <option value="Home">🏠 Home Delivery</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Delivery Address</label>
                            <input type="text" id="customer_address" required placeholder="e.g. 12 Main St" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-gray-50">
                        </div>

                        <button type="submit" id="submitRegBtn" class="w-full bg-slate-900 text-white font-black text-lg py-4 rounded-xl hover:bg-slate-800 shadow-md transition-transform transform active:scale-95 mt-4">
                            REGISTER ACCOUNT
                        </button>
                    </form>
                </div>

            </div>
        </section>

        <section class="lg:w-2/3 flex flex-col bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden flex-shrink-0 min-h-0">
            
            <div class="bg-slate-900 p-4 lg:p-6 text-white grid grid-cols-2 gap-4 border-b-4 border-indigo-500 shrink-0">
                <div class="bg-slate-800 rounded-xl p-4 border border-slate-700">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Route Sales Today</p>
                    <h3 id="kpi_route_sales" class="text-2xl font-black text-white">₹0.00</h3>
                </div>
                <div class="bg-slate-800 rounded-xl p-4 border border-slate-700">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Cash Collected Today</p>
                    <h3 id="kpi_route_cash" class="text-2xl font-black text-green-400">₹0.00</h3>
                </div>
            </div>

            <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50 shrink-0">
                <h2 class="text-lg font-black text-gray-800">Customer Directory & Khata</h2>
                <span class="text-xs font-bold text-gray-500 px-3 py-1 bg-white rounded-full shadow-sm border border-gray-200">Live Sync</span>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 bg-gray-50/50">
                <div id="manifestList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="col-span-full text-center py-10 text-gray-400 font-medium">Loading ledger data...</div>
                </div>
            </div>
        </section>
    </main>

    <script src="/static/js/distribution.js"></script>
</body>
</html>
